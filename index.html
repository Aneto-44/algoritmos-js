<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Sistema de Usuários</title>
    <link rel="stylesheet" href="mini-projetos/sistema-usuarios/style.css" />
  </head>

  <body>
    <h1>👥 Sistema de Usuários</h1>

    <div class="container-filtros">
      <input type="text" id="busca" placeholder="Buscar usuário..." />
      <button onclick="filtrar()">Buscar</button>
      <button onclick="ordenar()">Ordenar por idade</button>
      <button onclick="mostrarMaisVelho()">Mais velho</button>
      <button onclick="mostrarMaisNovo()">Mais novo</button>
    </div>
    <h2>Adicionar usuário</h2>

    <div class="container-filtros">
      <input type="text" id="nome" placeholder="Nome" />
      <input type="number" id="idade" placeholder="Idade" />

      <button onclick="adicionarUsuario()">Adicionar</button>
    </div>
    <ul id="lista"></ul>

    <script src="mini-projetos/sistema-usuarios/script.js"></script>
  </body>
</html>
